<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراقب الطاقة الذكي - AI Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2980b9;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .input-section {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background: #ecf0f1;
            padding: 20px;
            border-radius: 8px;
            align-items: flex-end;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }

        .input-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .input-group input,
        .input-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-add {
            background-color: var(--success);
            color: white;
            height: 40px;
        }

        .btn-add:hover {
            background-color: #219653;
        }

        .main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .list-section {
            flex: 1;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
            max-height: 300px;
            overflow-y: auto;
        }

        .chart-section {
            flex: 2;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }

        .summary-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        .summary-info p {
            margin: 5px 0;
            font-size: 18px;
            font-weight: bold;
        }

        .status-good {
            color: var(--success);
        }

        .status-bad {
            color: var(--danger);
        }

        .btn-ai {
            background-color: var(--primary);
            color: white;
            padding: 15px 30px;
            font-size: 16px;
        }

        .btn-ai:hover {
            background-color: #1a5276;
        }

        .btn-ai:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>مراقب الطاقة الذكي ⚡</h1>

        <div class="input-section">
            <div class="input-group">
                <label>أجهزة شائعة (للتسهيل):</label>
                <select id="presetDevice" onchange="autoFillWatt()">
                    <option value="">إدخال يدوي...</option>
                    <option value="1200">تكييف 1.5 حصان (1200 واط)</option>
                    <option value="1800">تكييف 2.25 حصان (1800 واط)</option>
                    <option value="200">ثلاجة (200 واط)</option>
                    <option value="500">غسالة ملابس (500 واط)</option>
                    <option value="2000">سخان كهربائي (2000 واط)</option>
                    <option value="1000">مكواة (1000 واط)</option>
                    <option value="100">تلفزيون LED (100 واط)</option>
                    <option value="75">مروحة (75 واط)</option>
                    <option value="12">لمبة ليد (12 واط)</option>
                </select>
            </div>
            <div class="input-group">
                <label>اسم الجهاز:</label>
                <input type="text" id="deviceName" placeholder="مثال: تكييف الصالة">
            </div>
            <div class="input-group">
                <label>الواط (W):</label>
                <input type="number" id="deviceWatt" placeholder="القدرة بالواط">
            </div>
            <div class="input-group">
                <label>ساعات العمل يومياً:</label>
                <input type="number" id="deviceHours" placeholder="عدد الساعات">
            </div>
            <button class="btn-add" onclick="addDevice()">إضافة الجهاز</button>
        </div>

        <div class="main-content">
            <div class="list-section">
                <h3>الأجهزة المضافة</h3>
                <ul id="deviceList"></ul>
            </div>
            <div class="chart-section">
                <canvas id="consumptionChart"></canvas>
            </div>
        </div>

        <div class="summary-section">
            <div class="summary-info">
                <p>الإجمالي: <span id="totalKwhText">0.00</span> كيلوواط/شهر</p>
                <p>التكلفة التقديرية: <span id="totalCostText">0.00</span> ج.م</p>
                <p>الحالة: <span id="statusText" class="status-good">مقبول (ضمن الحدود)</span></p>
            </div>
            <button id="aiBtn" class="btn-ai" onclick="analyzeWithAI()">تحليل بواسطة الذكاء الاصطناعي 🤖</button>
        </div>
    </div>

    <script>
        // --- 1. المتغيرات الأساسية ---
        let devices = [];
        let myChart = null;

        // --- 2. دالة الملء التلقائي للأجهزة ---
        function autoFillWatt() {
            const preset = document.getElementById("presetDevice");
            const nameInput = document.getElementById("deviceName");
            const wattInput = document.getElementById("deviceWatt");

            if (preset.value !== "") {
                wattInput.value = preset.value;
                nameInput.value = preset.options[preset.selectedIndex].text.split(" (")[0];
                wattInput.disabled = true;
            } else {
                wattInput.value = "";
                nameInput.value = "";
                wattInput.disabled = false;
            }
        }

        // --- 3. دالة حساب التكلفة (شرائح مصر) ---
        function calculateCost(kwh) {
            let cost = 0;
            if (kwh <= 50) cost = kwh * 0.68;
            else if (kwh <= 100) cost = (50 * 0.68) + ((kwh - 50) * 0.78);
            else if (kwh <= 200) cost = kwh * 0.95;
            else if (kwh <= 350) cost = (200 * 0.95) + ((kwh - 200) * 1.55);
            else if (kwh <= 650) cost = (200 * 0.95) + (150 * 1.55) + ((kwh - 350) * 1.65);
            else cost = kwh * 2.23;
            return cost;
        }

        // --- 4. إضافة جهاز للذاكرة ---
        function addDevice() {
            const name = document.getElementById("deviceName").value;
            const watt = parseFloat(document.getElementById("deviceWatt").value);
            const hours = parseFloat(document.getElementById("deviceHours").value);

            if (!name || isNaN(watt) || isNaN(hours)) {
                alert("يرجى ملء جميع الخانات بأرقام صحيحة.");
                return;
            }

            const monthlyKwh = (watt * hours * 30) / 1000;

            devices.push({ name, watt, hours, monthlyKwh });

            // تفريغ الحقول
            if (document.getElementById("presetDevice").value === "") {
                document.getElementById("deviceName").value = "";
                document.getElementById("deviceWatt").value = "";
            }
            document.getElementById("deviceHours").value = "";

            updateUI();
        }

        // --- 5. تحديث الشاشة (القائمة، الحسابات، الرسم البياني) ---
        function updateUI() {
            // تحديث القائمة
            const list = document.getElementById("deviceList");
            list.innerHTML = "";
            let totalKwh = 0;

            devices.forEach(d => {
                totalKwh += d.monthlyKwh;
                const li = document.createElement("li");
                li.innerHTML = `<span>${d.name}</span> <span>${d.monthlyKwh.toFixed(1)} kWh</span>`;
                list.appendChild(li);
            });

            // تحديث النصوص (الإجمالي والتكلفة والحالة)
            document.getElementById("totalKwhText").innerText = totalKwh.toFixed(2);
            document.getElementById("totalCostText").innerText = calculateCost(totalKwh).toFixed(2);

            const statusSpan = document.getElementById("statusText");
            if (totalKwh > 350) {
                statusSpan.innerText = "غير مقبول (تجاوز حد 350 ك.و)";
                statusSpan.className = "status-bad";
                document.getElementById("totalKwhText").style.color = "red";
            } else {
                statusSpan.innerText = "مقبول (ضمن الحدود)";
                statusSpan.className = "status-good";
                document.getElementById("totalKwhText").style.color = "black";
            }

            // تحديث الرسم البياني
            updateChart();
        }

        // --- 6. رسم الرسم البياني باستخدام Chart.js ---
        function updateChart() {
            const ctx = document.getElementById('consumptionChart').getContext('2d');
            const labels = devices.map(d => d.name);
            const data = devices.map(d => d.monthlyKwh);

            if (myChart) {
                myChart.destroy(); // حذف الرسم القديم قبل رسم الجديد
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'الاستهلاك الشهري (kWh)',
                        data: data,
                        backgroundColor: '#2980b9',
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // --- 7. الاتصال بـ Gemini AI (دالة اصطياد الأخطاء) ---
        // --- 7. الاتصال بـ Gemini AI (النسخة الذكية التي تبحث عن الموديل أوتوماتيكياً) ---
        async function analyzeWithAI() {
            if (devices.length === 0) {
                alert("يرجى إضافة أجهزة أولاً قبل التحليل.");
                return;
            }

            const btn = document.getElementById("aiBtn");
            btn.innerText = "جاري الاتصال بجوجل... ⏳";
            btn.disabled = true;

            // ⚠️ ضع مفتاح الـ API الخاص بك هنا ⚠️
            const API_KEY = "AIzaSyBkYiytr1MSq425yefSn5PZh_NuNTW2m8s";

            try {
                // الخطوة 1: سؤال جوجل عن الموديل المتاح والمسموح لك باستخدامه
                const modelsUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;
                const modelsResponse = await fetch(modelsUrl);
                const modelsData = await modelsResponse.json();

                let targetModel = "models/gemini-1.5-flash"; // اسم افتراضي لو البحث فشل

                if (modelsResponse.ok && modelsData.models) {
                    // البحث عن أول موديل بيدعم توليد النصوص في حسابك
                    const validModel = modelsData.models.find(m =>
                        m.supportedGenerationMethods &&
                        m.supportedGenerationMethods.includes("generateContent") &&
                        m.name.includes("gemini")
                    );
                    if (validModel) {
                        targetModel = validModel.name;
                        console.log("تم العثور على الموديل: " + targetModel);
                    }
                }

                // الخطوة 2: إرسال البيانات للموديل الذي تم اختياره
                const url = `https://generativelanguage.googleapis.com/v1beta/${targetModel}:generateContent?key=${API_KEY}`;

                let totalKwh = devices.reduce((sum, d) => sum + d.monthlyKwh, 0);
                let devicesText = devices.map(d => `${d.name} (${d.watt} وات)`).join("، ");
                let status = totalKwh > 350 ? "تجاوز الحد (350)" : "ضمن الحدود";
                let promptText = `استهلاكي ${totalKwh} ك.و وهو ${status}. أجهزتي: ${devicesText}. أعطني 3 نصائح عملية ومختصرة جدا لتقليل استهلاكي تحت 350 كيلووات باللغة العربية.`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });

                const data = await response.json();

                if (!response.ok) {
                    let errorMsg = data.error && data.error.message ? data.error.message : "خطأ غير معروف";
                    alert("رسالة جوجل: \n" + errorMsg);
                } else if (data.candidates && data.candidates.length > 0) {
                    let advice = data.candidates[0].content.parts[0].text;
                    alert("🤖 نصائح الذكاء الاصطناعي:\n\n" + advice.replace(/\*/g, ""));
                } else {
                    alert("تم الاتصال ولكن لم يرسل الذكاء الاصطناعي نصاً.");
                }

            } catch (error) {
                alert("مشكلة في الاتصال: " + error.message);
                console.error(error);
            } finally {
                btn.innerText = "تحليل بواسطة الذكاء الاصطناعي 🤖";
                btn.disabled = false;
            }
        }
    </script>

</body>

</html>
